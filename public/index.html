
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Function Reactor by Mustafa Zariwala</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.9/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ext-language_tools.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar panel">
        <div class="sidebar-header">
          <div>
            <p class="eyebrow">Workspace</p>
            <h1>Function Reactor</h1>
          </div>
          <button class="ghost-button" id="col-button-createNew">
            <span class="material-symbols-outlined">add</span>
            New
          </button>
        </div>

        <div class="auth-panel">
          <p class="muted-text" id="authStatus">Not logged in</p>
          <label class="auth-field">
            <span>Email</span>
            <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" />
          </label>
          <label class="auth-field">
            <span>Password</span>
            <input type="password" id="authPassword" placeholder="At least 8 characters" autocomplete="current-password" />
          </label>
          <div class="auth-actions">
            <button class="button secondary" id="loginButton">Login</button>
            <button class="button secondary" id="registerButton">Register</button>
            <button class="button danger" id="logoutButton" style="display: none">Logout</button>
          </div>
        </div>

        <label class="search-field">
          <span class="material-symbols-outlined">search</span>
          <input type="text" id="functionSearchInput" placeholder="Search functions" />
        </label>

        <div class="sidebar-toggles">
          <label class="toggle-card" for="auto-run-checkbox">
            <div>
              <strong>Auto run</strong>
              <p>Run code automatically while editing.</p>
            </div>
            <input class="checkbox" id="auto-run-checkbox" type="checkbox" />
          </label>

          <label class="toggle-card" for="auto-save-checkbox">
            <div>
              <strong>Auto save</strong>
              <p>Save your current function after changes.</p>
            </div>
            <input class="checkbox" id="auto-save-checkbox" type="checkbox" />
          </label>
        </div>

        <div id="col-button" class="function-list"></div>
      </aside>

      <main class="workspace">
        <section class="editor-panel panel">
          <div class="panel-header editor-toolbar">
            <div class="name-field-wrap">
              <input type="text" id="saveInput" placeholder="Function Name" />
              <p id="editorStatus" class="muted-text">Ready</p>
            </div>
            <div class="toolbar-actions">
              <button class="button secondary" id="runButton">
                <span class="material-symbols-outlined">play_arrow</span>
                Run
              </button>
              <button class="button" id="saveButton">
                <span class="material-symbols-outlined">save</span>
                Save
              </button>
              <button class="button danger" id="deleteButton">
                <span class="material-symbols-outlined">delete</span>
                Delete
              </button>
            </div>
          </div>
          <div id="col-code-text"></div>
        </section>

        <section class="result-panel panel">
          <div class="panel-header result-toolbar">
            <div>
              <p class="eyebrow">Output</p>
              <h2>Result</h2>
            </div>
            <div class="toolbar-actions">
              <span class="material-symbols-outlined sync-icon" id="reload-sync-icon">
                sync
              </span>
              <button class="icon-button" id="settingButton" title="Settings">
                <span class="material-symbols-outlined">settings</span>
              </button>
              <button class="button secondary" id="col-result-copy-button">
                <span class="material-symbols-outlined">content_copy</span>
                Copy
              </button>
            </div>
          </div>

          <div class="result-meta">
            <span id="col-result-time">Not run yet</span>
            <span id="executionStatus" class="status-pill">Idle</span>
          </div>

          <pre id="col-result" class="result-box">Run a function to see the result here.</pre>
        </section>
      </main>
    </div>

    <div id="settingModal" class="modal">
      <div class="modal-content panel">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>Customize editor</h2>
          </div>
          <button id="settingModalClose" class="icon-button close-button">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <div class="modal-layout">
          <div id="tabs" class="modal-tabs">
            <button class="button secondary" onclick="toggleModalSection('libraries-div')">
              Libraries
            </button>
            <button class="button secondary" onclick="toggleModalSection('editor-div')">
              Editor
            </button>
          </div>

          <div id="modal-display" class="modal-display">
            <section id="libraries-div">
              <label class="search-field">
                <span class="material-symbols-outlined">travel_explore</span>
                <input
                  id="scriptSearchInput"
                  type="text"
                  placeholder="Search cdnjs libraries"
                />
              </label>
              <table id="display-table">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Version</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </section>

            <section id="editor-div">
              <div class="form-group">
                <label for="theme-select">Editor Theme</label>
                <select id="theme-select" name="theme-select"></select>
              </div>
              <div class="form-group form-checkbox">
                <label for="auto-run-checkbox-modal">Auto run</label>
                <input type="checkbox" id="auto-run-checkbox-modal" />
              </div>
              <div class="form-group form-checkbox">
                <label for="auto-save-checkbox-modal">Auto save</label>
                <input type="checkbox" id="auto-save-checkbox-modal" />
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
